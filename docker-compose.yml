services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: golfclub
      POSTGRES_USER: golfclub
      POSTGRES_PASSWORD: golfclub
    ports:
      - "5432:5432"
    volumes:
      - golfclub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golfclub -d golfclub"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=golfclub;Username=golfclub;Password=golfclub"
      ASPNETCORE_ENVIRONMENT: Development
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:3001"
      # Booking Start/End are naive timestamps representing club-local time (see README) — the
      # container's OS timezone must match the club's, since the API compares them to DateTime.Now.
      TZ: "Europe/Helsinki"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  booking-web:
    build:
      context: ./frontend-booking
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5000"
    ports:
      - "3000:80"
    depends_on:
      - api

  admin-web:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5000"
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  golfclub-postgres-data:
